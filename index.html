const L=[
{id:0,title:"📖 Introducción",desc:"Antes de escribir código, entiende qué estamos haciendo y por qué.",isIntro:true,concepts:[
{title:"¿Qué es JavaScript?",text:'JavaScript (JS) es un lenguaje de programación. Es el lenguaje que usan las páginas web, las apps, y — lo que nos importa — el <strong>Code node de n8n</strong>. No necesitas ser programador para usarlo. Solo necesitas aprender las piezas justas para tus workflows.'},
{title:"¿Por qué necesito JS en n8n?",text:'n8n tiene nodos para casi todo: Telegram, Google Sheets, Email... Pero a veces necesitas hacer algo que ningún nodo hace: <strong>transformar datos</strong>, <strong>calcular algo</strong>, <strong>tomar decisiones con lógica</strong>, o <strong>formatear una respuesta</strong>. Ahí entra el <strong>Code node</strong>, y se programa en JavaScript.'},
{title:"¿Cuánto JS necesito saber?",text:'Muy poco. De todo lo que existe en JavaScript, tú solo necesitas un <strong>5-10%</strong> para n8n. Este curso te enseña SOLO ese porcentaje. Nada de frameworks, nada de frontend, nada de teoría innecesaria. Solo las piezas que vas a usar en tus Code nodes.'},
{title:"El patrón que siempre seguirás",text:'Todo Code node en n8n sigue el mismo patrón de 3 pasos. <strong>Siempre</strong>. Da igual lo que hagas:',code:{label:'Patrón universal',content:'<span class="comment">// 1. COGER — sacar datos del nodo anterior</span>\n<span class="keyword">const</span> dato = $input.first().json.campo;\n\n<span class="comment">// 2. PROCESAR — hacer algo con esos datos</span>\n<span class="keyword">const</span> resultado = hacer_algo(dato);\n\n<span class="comment">// 3. DEVOLVER — pasar el resultado al siguiente nodo</span>\n<span class="keyword">return</span> [{ json: { resultado: resultado } }];'},n8n:'Memoriza esto: <strong>coger → procesar → devolver</strong>. Es lo único que hace un Code node. Las 14 lecciones te enseñan las herramientas para cada paso.'},
{title:"¿Qué vas a aprender?",text:'El curso tiene <strong>3 bloques</strong>:<br><br><strong>🟢 Básico (lecciones 1-7):</strong> Variables, texto, números, condiciones, arrays, objetos, y el return de n8n. Con esto ya puedes escribir Code nodes simples.<br><br><strong>🟡 Intermedio (lecciones 8-13):</strong> Map/filter para procesar listas, try/catch para errores, fechas, async/await para APIs, múltiples items, y $input avanzado. Con esto manejas workflows complejos.<br><br><strong>🔴 Evaluación (lecciones 14-15):</strong> Ejercicio final que junta todo + examen con IA que evalúa tu nivel real.'},
{title:"¿Cómo funciona este curso?",text:'Cada lección tiene:<br><br>• <strong>Teoría</strong> — explicación corta con ejemplos de código<br>• <strong>Contexto n8n</strong> — cómo se usa en la práctica en tus workflows<br>• <strong>Ejercicio</strong> — tú escribes el código<br>• <strong>Verificación</strong> — la IA de OpenAI corrige tu código y te da feedback<br>• <strong>Ejercicios generativos</strong> — si quieres practicar más, la IA te genera ejercicios nuevos infinitos<br><br>No necesitas completar todo de una vez. Tu progreso se guarda automáticamente.'}
],exercise:null},
{id:1,title:"Variables",desc:"Guardar datos en el Code node.",concepts:[{title:"const — valor fijo",text:'<strong>const</strong> crea una variable inmutable.',code:{label:'JS',content:'<span class="keyword">const</span> nombre = <span class="string">"María"</span>;\n<span class="keyword">const</span> edad = <span class="number">30</span>;\n<span class="keyword">const</span> activo = <span class="number">true</span>;'},n8n:'<code>const msg = $input.first().json.message.text;</code>'},{title:"let — valor mutable",text:'<strong>let</strong> permite cambiar el valor después.',code:{label:'JS',content:'<span class="keyword">let</span> x = <span class="number">0</span>;\nx = <span class="number">1</span>; <span class="comment">// OK</span>\n\n<span class="keyword">const</span> y = <span class="number">10</span>;\ny = <span class="number">20</span>; <span class="comment">// ERROR!</span>'},n8n:'Usa <strong>let</strong> cuando el valor cambie (ej: dentro de if/else).'}],exercise:{title:"Crea 3 variables",desc:'<strong>producto</strong>="Laptop", <strong>precio</strong>=999, <strong>disponible</strong>=true.',placeholder:'// Escribe aquí\n',check:c=>/const\s+producto\s*=\s*["']Laptop["']/.test(c)&&/const\s+precio\s*=\s*999/.test(c)&&/const\s+disponible\s*=\s*true/.test(c),hint:'const nombre = valor; Texto entre comillas.',solution:'const producto = "Laptop";\nconst precio = 999;\nconst disponible = true;',aiContext:'3 const: producto="Laptop", precio=999, disponible=true.'}},
{id:2,title:"Strings: texto",desc:"Manipular mensajes, emails, nombres...",concepts:[{title:"Métodos de texto",text:'Los strings tienen <strong>métodos</strong> que transforman.',code:{label:'JS',content:'<span class="keyword">const</span> m = <span class="string">"Hola Mundo"</span>;\nm.<span class="function">toUpperCase</span>()   <span class="comment">// "HOLA MUNDO"</span>\nm.<span class="function">toLowerCase</span>()   <span class="comment">// "hola mundo"</span>\nm.<span class="function">length</span>           <span class="comment">// 10</span>\nm.<span class="function">includes</span>(<span class="string">"Hola"</span>) <span class="comment">// true</span>\nm.<span class="function">replace</span>(<span class="string">"Mundo"</span>,<span class="string">"n8n"</span>) <span class="comment">// "Hola n8n"</span>\nm.<span class="function">trim</span>()            <span class="comment">// quita espacios</span>'},n8n:'Limpiar mensajes de Telegram y formatear respuestas.'},{title:"Template literals",text:'Con backticks (`) metes variables: <strong>${variable}</strong>.',code:{label:'JS',content:'<span class="keyword">const</span> n = <span class="string">"Pedro"</span>;\n<span class="keyword">const</span> msg = <span class="string">`Hola ${n}, bienvenido`</span>;'},n8n:'<code>const resp = `Palabras: ${count}\\nChars: ${chars}`</code>'}],exercise:{title:"Transforma texto",desc:'<code>const mensaje = "hola que tal"</code>. Crea <strong>resultado</strong> (mayúsculas) y <strong>largo</strong> (caracteres).',placeholder:'const mensaje = "hola que tal";\n\n',check:c=>/const\s+resultado\s*=\s*mensaje\.toUpperCase\(\)/.test(c)&&/const\s+largo\s*=\s*mensaje\.length/.test(c),hint:'mensaje.toUpperCase() y mensaje.length',solution:'const mensaje = "hola que tal";\n\nconst resultado = mensaje.toUpperCase();\nconst largo = mensaje.length;',aiContext:'resultado=mensaje.toUpperCase(), largo=mensaje.length'}},
{id:3,title:"Números",desc:"Calcular precios, contar, promediar...",concepts:[{title:"Operaciones",text:'Operadores normales más <strong>%</strong> (resto).',code:{label:'JS',content:'<span class="number">10</span> + <span class="number">3</span>  <span class="comment">// 13</span>\n<span class="number">10</span> - <span class="number">3</span>  <span class="comment">// 7</span>\n<span class="number">10</span> * <span class="number">3</span>  <span class="comment">// 30</span>\n<span class="number">10</span> / <span class="number">3</span>  <span class="comment">// 3.33</span>\n<span class="number">10</span> % <span class="number">3</span>  <span class="comment">// 1 (resto)</span>'},n8n:'<code>n % 2 === 0</code> → par.'},{title:"Texto → número",text:'Datos de Telegram = texto. Convierte con <strong>Number()</strong>.',code:{label:'JS',content:'<span class="keyword">const</span> t = <span class="string">"42"</span>;\n<span class="keyword">const</span> n = <span class="function">Number</span>(t); <span class="comment">// 42</span>\nn + <span class="number">8</span>  <span class="comment">// 50 ✅</span>\nt + <span class="number">8</span>  <span class="comment">// "428" ❌</span>'},n8n:'<code>const num = Number($input.first().json.message.text);</code>'}],exercise:{title:"Calcula total",desc:'<code>const precioTexto = "150"</code>. Crea <strong>precio</strong> (Number), <strong>iva</strong> (21%), <strong>total</strong>.',placeholder:'const precioTexto = "150";\n\n',check:c=>/const\s+precio\s*=\s*Number\(precioTexto\)/.test(c)&&/const\s+iva\s*=\s*precio\s*\*\s*0?\.21/.test(c)&&/const\s+total\s*=\s*precio\s*\+\s*iva/.test(c),hint:'Number() convierte. 21% = *0.21.',solution:'const precioTexto = "150";\n\nconst precio = Number(precioTexto);\nconst iva = precio * 0.21;\nconst total = precio + iva;',aiContext:'Number("150"), iva=precio*0.21, total=precio+iva.'}},
{id:4,title:"Condicionales: if/else",desc:"Si pasa X haz esto, si no haz lo otro.",concepts:[{title:"if / else / else if",text:'<strong>if</strong> evalúa condición. <strong>else if</strong> para más opciones.',code:{label:'JS',content:'<span class="keyword">let</span> r;\n<span class="keyword">if</span> (nota >= <span class="number">90</span>) {\n  r = <span class="string">"Excelente"</span>;\n} <span class="keyword">else if</span> (nota >= <span class="number">70</span>) {\n  r = <span class="string">"Aprobado"</span>;\n} <span class="keyword">else</span> {\n  r = <span class="string">"Suspendido"</span>;\n}'},n8n:'Usa <strong>let</strong> antes del if si asignas dentro.'},{title:"Comparadores",text:'Siempre <strong>===</strong> (triple igual).',code:{label:'JS',content:'a === b  <span class="comment">// igual</span>\na !== b  <span class="comment">// diferente</span>\na > b    <span class="comment">// mayor</span>\na < b    <span class="comment">// menor</span>\na >= b   <span class="comment">// mayor o igual</span>'},n8n:'Nunca uses == (doble). Siempre ===.'}],exercise:{title:"Clasifica número",desc:'<code>const numero = 7</code>. Crea <strong>tipo</strong> (positivo/negativo/cero) y <strong>paridad</strong> (par/impar).',placeholder:'const numero = 7;\n\n',check:c=>(/if\s*\(\s*numero\s*>\s*0\s*\)/.test(c)||/if\s*\(\s*numero\s*===\s*0\s*\)/.test(c))&&/numero\s*%\s*2\s*===\s*0/.test(c)&&/tipo\s*=/.test(c)&&/paridad\s*=/.test(c),hint:'let tipo; if (numero > 0)... Paridad: numero % 2 === 0.',solution:'const numero = 7;\n\nlet tipo;\nif (numero > 0) {\n  tipo = "positivo";\n} else if (numero < 0) {\n  tipo = "negativo";\n} else {\n  tipo = "cero";\n}\n\nlet paridad;\nif (numero % 2 === 0) {\n  paridad = "par";\n} else {\n  paridad = "impar";\n}',aiContext:'if/else if/else para tipo, % 2 para paridad.'}},
{id:5,title:"Ternario: if en 1 línea",desc:"Versión corta del if/else para decisiones simples.",concepts:[{title:"condición ? si : no",text:'Una línea en vez de 5.',code:{label:'JS',content:'<span class="comment">// if/else (5 líneas)</span>\n<span class="keyword">let</span> estado;\n<span class="keyword">if</span> (edad >= <span class="number">18</span>) { estado = <span class="string">"adulto"</span>; }\n<span class="keyword">else</span> { estado = <span class="string">"menor"</span>; }\n\n<span class="comment">// Ternario (1 línea)</span>\n<span class="keyword">const</span> estado = edad >= <span class="number">18</span> ? <span class="string">"adulto"</span> : <span class="string">"menor"</span>;'},n8n:'Muy usado en el return para decidir valores rápido.'},{title:"Ternarios anidados",text:'Para más de 2 opciones.',code:{label:'JS',content:'<span class="keyword">const</span> tipo = n > <span class="number">0</span> ? <span class="string">"positivo"</span>\n  : n < <span class="number">0</span> ? <span class="string">"negativo"</span>\n  : <span class="string">"cero"</span>;'},n8n:'Si se complica mucho, mejor if/else normal.'}],exercise:{title:"Usa ternarios",desc:'<code>const puntos = 85</code>. Crea <strong>nivel</strong> ("avanzado" si >=80, "básico") y <strong>paridad</strong> ("par"/"impar"). Con ternarios.',placeholder:'const puntos = 85;\n\n',check:c=>/const\s+nivel\s*=.*\?/.test(c)&&/const\s+paridad\s*=.*\?/.test(c),hint:'const nivel = puntos >= 80 ? "avanzado" : "básico";',solution:'const puntos = 85;\n\nconst nivel = puntos >= 80 ? "avanzado" : "básico";\nconst paridad = puntos % 2 === 0 ? "par" : "impar";',aiContext:'Ternario para nivel y paridad.'}},
{id:6,title:"Arrays: listas",desc:"Listas de datos — muy comunes en n8n.",concepts:[{title:"Crear y acceder",text:'Posiciones desde <strong>0</strong>.',code:{label:'JS',content:'<span class="keyword">const</span> f = [<span class="string">"manzana"</span>, <span class="string">"pera"</span>, <span class="string">"uva"</span>];\nf[<span class="number">0</span>]  <span class="comment">// "manzana"</span>\nf[<span class="number">2</span>]  <span class="comment">// "uva"</span>\nf.<span class="function">length</span>  <span class="comment">// 3</span>'},n8n:'La misma escalera: <code>$json.choices[0].message.content</code>'},{title:"split / join / filter",text:'Métodos esenciales.',code:{label:'JS',content:'<span class="string">"a,b,c"</span>.<span class="function">split</span>(<span class="string">","</span>)  <span class="comment">// ["a","b","c"]</span>\n[<span class="string">"a"</span>,<span class="string">"b"</span>].<span class="function">join</span>(<span class="string">", "</span>)  <span class="comment">// "a, b"</span>\n[<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>].<span class="function">filter</span>(n => n > <span class="number">1</span>)  <span class="comment">// [2,3]</span>'},n8n:'<strong>split</strong> y <strong>join</strong> son los más usados.'}],exercise:{title:"Trabaja con arrays",desc:'<code>const palabras = "hola que tal estás"</code>. Crea <strong>lista</strong>, <strong>primera</strong>, <strong>ultima</strong>, <strong>total</strong>.',placeholder:'const palabras = "hola que tal estás";\n\n',check:c=>/const\s+lista\s*=\s*palabras\.split\(/.test(c)&&/const\s+primera\s*=\s*lista\[0\]/.test(c)&&/const\s+total\s*=\s*lista\.length/.test(c),hint:'split(" "), lista[0], lista[lista.length-1], lista.length',solution:'const palabras = "hola que tal estás";\n\nconst lista = palabras.split(" ");\nconst primera = lista[0];\nconst ultima = lista[lista.length - 1];\nconst total = lista.length;',aiContext:'split, [0], [length-1], length.'}},
{id:7,title:"Objetos: JSON",desc:"JSON de n8n = objetos JavaScript.",concepts:[{title:"Crear y acceder",text:'Datos con <strong>claves</strong>.',code:{label:'JS',content:'<span class="keyword">const</span> c = { nombre: <span class="string">"Ana"</span>, edad: <span class="number">28</span> };\nc.nombre  <span class="comment">// "Ana"</span>'},n8n:'<code>$json.message.text</code> = acceder a un objeto.'},{title:"Anidados",text:'Objetos dentro de objetos con arrays.',code:{label:'JS',content:'<span class="keyword">const</span> p = {\n  cliente: { nombre: <span class="string">"Pedro"</span> },\n  items: [<span class="string">"laptop"</span>, <span class="string">"mouse"</span>]\n};\np.cliente.nombre  <span class="comment">// "Pedro"</span>\np.items[<span class="number">0</span>]  <span class="comment">// "laptop"</span>'},n8n:'La escalera aplica igual.'}],exercise:{title:"Navega el objeto",desc:'Saca <strong>email</strong>, <strong>segundo</strong> producto, <strong>total</strong> productos.',placeholder:'const datos = {\n  contacto: { nombre: "Luis", email: "luis@mail.com" },\n  productos: ["silla", "mesa", "lámpara"]\n};\n\n',check:c=>/const\s+email\s*=\s*datos\.contacto\.email/.test(c)&&/const\s+segundo\s*=\s*datos\.productos\[1\]/.test(c)&&/const\s+total\s*=\s*datos\.productos\.length/.test(c),hint:'datos.contacto.email, datos.productos[1], datos.productos.length',solution:'const datos = {\n  contacto: { nombre: "Luis", email: "luis@mail.com" },\n  productos: ["silla", "mesa", "lámpara"]\n};\n\nconst email = datos.contacto.email;\nconst segundo = datos.productos[1];\nconst total = datos.productos.length;',aiContext:'Acceder a objetos anidados y arrays.'}},
{id:8,title:"Map y Filter",desc:"Transformar y filtrar listas enteras de golpe.",concepts:[{title:"map — transformar todo",text:'Crea nuevo array aplicando función a cada elemento.',code:{label:'JS',content:'<span class="keyword">const</span> precios = [<span class="number">10</span>, <span class="number">20</span>, <span class="number">30</span>];\n<span class="keyword">const</span> conIva = precios.<span class="function">map</span>(p => p * <span class="number">1.21</span>);\n<span class="comment">// [12.1, 24.2, 36.3]</span>'},n8n:'Transformar todos los items de golpe.'},{title:"filter — quedarte con algunos",text:'Solo los que cumplan la condición.',code:{label:'JS',content:'<span class="keyword">const</span> edades = [<span class="number">15</span>, <span class="number">22</span>, <span class="number">17</span>, <span class="number">30</span>];\n<span class="keyword">const</span> adultos = edades.<span class="function">filter</span>(e => e >= <span class="number">18</span>);\n<span class="comment">// [22, 30]</span>'},n8n:'Filtrar emails no leídos, pedidos pendientes, etc.'}],exercise:{title:"Map y Filter",desc:'<code>const nums = [5, 12, 8, 30, 3, 18]</code>. Crea <strong>dobles</strong> (*2 con map) y <strong>grandes</strong> (>10 con filter).',placeholder:'const nums = [5, 12, 8, 30, 3, 18];\n\n',check:c=>/const\s+dobles\s*=\s*nums\.map\(/.test(c)&&/const\s+grandes\s*=\s*nums\.filter\(/.test(c),hint:'dobles = nums.map(n => n * 2); grandes = nums.filter(n => n > 10)',solution:'const nums = [5, 12, 8, 30, 3, 18];\n\nconst dobles = nums.map(n => n * 2);\nconst grandes = nums.filter(n => n > 10);',aiContext:'map para duplicar, filter para >10.'}},
{id:9,title:"Try/Catch: errores",desc:"Evitar que tu workflow se rompa cuando algo falla.",concepts:[{title:"try/catch",text:'Envuelve código peligroso. Si falla, catch lo atrapa.',code:{label:'JS',content:'<span class="keyword">try</span> {\n  <span class="keyword">const</span> d = JSON.<span class="function">parse</span>(texto);\n} <span class="keyword">catch</span> (error) {\n  <span class="keyword">const</span> d = { msg: <span class="string">"Error"</span> };\n}'},n8n:'Sin try/catch el workflow entero se detiene. Con él, manejas el error y continúas.'},{title:"isNaN y throw",text:'Validar datos y lanzar errores a propósito.',code:{label:'JS',content:'<span class="keyword">const</span> n = <span class="function">Number</span>(texto);\n<span class="keyword">if</span> (<span class="function">isNaN</span>(n)) {\n  <span class="keyword">throw new</span> <span class="function">Error</span>(<span class="string">"No es número"</span>);\n}'},n8n:'<strong>isNaN()</strong> = no es número. <strong>throw</strong> lanza error para que catch lo atrape.'}],exercise:{title:"Protege con try/catch",desc:'Code node: convierte mensaje a número y calcula doble. Si falla, devuelve <strong>error: "Envía un número"</strong>.',placeholder:'// try/catch\n',check:c=>/try\s*\{/.test(c)&&/catch/.test(c)&&/return/.test(c),hint:'try { Number() + isNaN check } catch { error message }',solution:'let resultado;\n\ntry {\n  const msg = $input.first().json.message.text;\n  const num = Number(msg);\n  if (isNaN(num)) throw new Error("No es número");\n  resultado = { numero: num, doble: num * 2 };\n} catch (error) {\n  resultado = { error: "Envía un número" };\n}\n\nreturn [{ json: resultado }];',aiContext:'try/catch con Number(), isNaN(), throw, return.'}},
{id:10,title:"Fechas",desc:"Timestamps, formatear, comparar. Esencial para plazos.",concepts:[{title:"Date",text:'Meses empiezan en <strong>0</strong> (enero=0).',code:{label:'JS',content:'<span class="keyword">const</span> h = <span class="keyword">new</span> <span class="function">Date</span>();\nh.<span class="function">getFullYear</span>()  <span class="comment">// 2026</span>\nh.<span class="function">getMonth</span>()     <span class="comment">// 0-11</span>\nh.<span class="function">getDate</span>()      <span class="comment">// día</span>\nh.<span class="function">getDay</span>()       <span class="comment">// 0=dom</span>\nh.<span class="function">toISOString</span>()  <span class="comment">// formato ISO</span>'},n8n:'APIs esperan ISO. Usa <code>.toISOString()</code>.'}],exercise:{title:"Fechas",desc:'Crea <strong>hoy</strong> (Date). <strong>fechaFormateada</strong> DD/MM/YYYY. <strong>esFinDeSemana</strong> (sáb o dom).',placeholder:'// Fechas\n',check:c=>/new\s+Date/.test(c)&&/getMonth/.test(c)&&/getDay/.test(c),hint:'getDate(), getMonth()+1, getFullYear(), getDay()===0||===6',solution:'const hoy = new Date();\nconst fechaFormateada = `${hoy.getDate()}/${hoy.getMonth()+1}/${hoy.getFullYear()}`;\nconst esFinDeSemana = hoy.getDay() === 0 || hoy.getDay() === 6;',aiContext:'new Date, formatear DD/MM/YYYY, getDay para fin de semana.'}},
{id:11,title:"Async/Await",desc:"Esperar respuestas de APIs dentro del Code node.",concepts:[{title:"await",text:'<strong>await</strong> = espera a que termine.',code:{label:'JS',content:'<span class="comment">// Sin await ❌</span>\n<span class="keyword">const</span> d = <span class="function">fetch</span>(url); <span class="comment">// Promise, no datos</span>\n\n<span class="comment">// Con await ✅</span>\n<span class="keyword">const</span> r = <span class="keyword">await</span> <span class="function">fetch</span>(url);\n<span class="keyword">const</span> d = <span class="keyword">await</span> r.<span class="function">json</span>();'},n8n:'El Code node soporta <strong>await</strong> directamente. No necesitas async function.'}],exercise:{title:"Fetch con await",desc:'Llama a <code>https://jsonplaceholder.typicode.com/todos/1</code> y devuelve los datos.',placeholder:'// fetch + await\n',check:c=>/await\s+fetch/.test(c)&&/await.*\.json\(\)/.test(c)&&/return/.test(c),hint:'const r = await fetch(url); const d = await r.json(); return [{json:d}];',solution:'const response = await fetch("https://jsonplaceholder.typicode.com/todos/1");\nconst datos = await response.json();\n\nreturn [{ json: datos }];',aiContext:'await fetch(), await .json(), return.'}},
{id:12,title:"Múltiples items",desc:"Devolver varios resultados, no uno solo.",concepts:[{title:"Array de items",text:'Cada objeto en el return = un item separado en n8n.',code:{label:'JS',content:'<span class="comment">// 1 item</span>\n<span class="keyword">return</span> [{ json: { n: <span class="string">"Ana"</span> } }];\n\n<span class="comment">// 3 items (nodo siguiente se ejecuta 3 veces)</span>\n<span class="keyword">return</span> [\n  { json: { n: <span class="string">"Ana"</span> } },\n  { json: { n: <span class="string">"Pedro"</span> } },\n  { json: { n: <span class="string">"Luis"</span> } }\n];'},n8n:'3 items → Telegram envía 3 mensajes.'},{title:"map para items",text:'Convertir array en items de n8n.',code:{label:'JS',content:'<span class="keyword">const</span> nombres = [<span class="string">"Ana"</span>, <span class="string">"Pedro"</span>];\n\n<span class="keyword">return</span> nombres.<span class="function">map</span>(n => ({\n  json: { nombre: n, saludo: <span class="string">`Hola ${n}`</span> }\n}));'},n8n:'Patrón potente: lista → items que fluyen por el workflow.'}],exercise:{title:"Múltiples items",desc:'<code>const frutas = ["manzana","pera","uva"]</code>. Devuelve item por fruta con <strong>fruta</strong> y <strong>mayusculas</strong>.',placeholder:'const frutas = ["manzana", "pera", "uva"];\n\n',check:c=>/return\s+frutas\.map/.test(c)&&/json\s*:/.test(c)&&/toUpperCase/.test(c),hint:'return frutas.map(f => ({ json: { fruta: f, mayusculas: f.toUpperCase() } }));',solution:'const frutas = ["manzana", "pera", "uva"];\n\nreturn frutas.map(f => ({\n  json: { fruta: f, mayusculas: f.toUpperCase() }\n}));',aiContext:'return frutas.map() con json: { fruta, mayusculas }.'}},
{id:13,title:"$input avanzado",desc:"first() vs all() — un item o todos.",concepts:[{title:"first() vs all()",text:'<strong>first()</strong> = un item. <strong>all()</strong> = todos.',code:{label:'JS',content:'<span class="comment">// Un item</span>\n<span class="keyword">const</span> d = $input.first().json;\n\n<span class="comment">// Todos</span>\n<span class="keyword">const</span> todos = $input.all();\n<span class="comment">// [{json:{...}}, {json:{...}}, ...]</span>\n\n<span class="keyword">return</span> todos.<span class="function">map</span>(i => ({\n  json: { original: i.json.nombre }\n}));'},n8n:'<strong>first()</strong> para un dato. <strong>all()</strong> para procesar listas.'},{title:"filter + map combo",text:'Filtrar y transformar encadenado.',code:{label:'JS',content:'<span class="keyword">return</span> $input.all()\n  .<span class="function">filter</span>(i => i.json.activo)\n  .<span class="function">map</span>(i => ({\n    json: { nombre: i.json.nombre.<span class="function">toUpperCase</span>() }\n  }));'},n8n:'El patrón más potente: filtrar + transformar + devolver.'}],exercise:{title:"Procesa múltiples items",desc:'Usa <code>$input.all()</code>. Cada item tiene email y activo. Filtra activos y devuelve email + dominio (después de @).',placeholder:'// Filtra activos, extrae dominio\n',check:c=>/\$input\.all\(\)/.test(c)&&/filter/.test(c)&&/map/.test(c)&&/split/.test(c)&&/return/.test(c),hint:'items.filter(i=>i.json.activo).map(i=>({json:{email:i.json.email, dominio:i.json.email.split("@")[1]}}))',solution:'const items = $input.all();\n\nreturn items\n  .filter(i => i.json.activo === true)\n  .map(i => ({\n    json: {\n      email: i.json.email,\n      dominio: i.json.email.split("@")[1]\n    }\n  }));',aiContext:'$input.all(), filter activos, map con split("@")[1].'}},

let done=new Set(),cur=0;
function loadS(){try{const s=localStorage.getItem('jsn8n_done');if(s)done=new Set(JSON.parse(s));const l=localStorage.getItem('jsn8n_cur');if(l)cur=parseInt(l);const k=localStorage.getItem('jsn8n_key');if(k)document.getElementById('apiKeyInput').value=k;const m=localStorage.getItem('jsn8n_mdl');if(m)document.getElementById('modelSelect').value=m;}catch(e){}updAPI();}
function saveS(){try{localStorage.setItem('jsn8n_done',JSON.stringify([...done]));localStorage.setItem('jsn8n_cur',cur.toString());}catch(e){}}
function saveApiKey(){try{localStorage.setItem('jsn8n_key',document.getElementById('apiKeyInput').value.trim());}catch(e){}updAPI();}
function saveModel(){try{localStorage.setItem('jsn8n_mdl',document.getElementById('modelSelect').value);}catch(e){}}

function hideRM(){document.getElementById('resetModal').classList.remove('show');}

function rNav(){document.getElementById('nav').innerHTML=L.map((l,i)=>`<button class="nav-btn ${i===cur?'active':''} ${done.has(i)?'completed':''}" onclick="go(${i})">${l.id}. ${l.title}</button>`).join('');}

<p class="lesson-desc">Sin ayuda. Escribe tu código y al final pulsa "Enviar examen" para que la IA te evalúe.</p></div>`;

examQuestions.forEach((q,idx)=>{
h+=`<div class="exercise" style="border-color:var(--yellow)">
<div class="exercise-label" style="color:var(--yellow)">Pregunta ${idx+1}/5 — ${q.topic||''}</div>
<p>${q.q}</p>
<textarea class="code-input" id="exam-${idx}" spellcheck="false" oninput="examAnswers[${idx}]=this.value">${examAnswers[idx]||q.startCode||'// Tu código aquí\n'}</textarea>
</div>`;});

h+=`<button class="btn-next visible" id="examSubmit" onclick="submitExam(${i})" style="background:linear-gradient(135deg,var(--yellow),#f59e0b);color:#000">📝 Enviar examen</button>
<div id="examResult"></div>
<button class="btn-next" id="retryExam" onclick="examStarted=false;examQuestions=[];examAnswers={};renderExam(${i})" style="display:none;margin-top:.75rem;background:linear-gradient(135deg,#6366f1,#8b5cf6)">🔄 Repetir examen</button>
</div>`;
c.innerHTML=h;
}

async function submitExam(i){
const k=document.getElementById('apiKeyInput').value.trim(),m=document.getElementById('modelSelect').value;
// Collect answers
for(let idx=0;idx<examQuestions.length;idx++){
const ta=document.getElementById(`exam-${idx}`);
if(ta)examAnswers[idx]=ta.value;
}
const btn=document.getElementById('examSubmit');
const res=document.getElementById('examResult');
btn.disabled=true;btn.textContent='⏳ Evaluando...';
res.innerHTML='<div class="feedback ai-response" style="display:block;margin-top:1rem"><div class="ai-badge">🤖 IA</div> Corrigiendo tu examen... esto puede tardar unos segundos.</div>';

let examData='';
examQuestions.forEach((q,idx)=>{
examData+=`\n--- PREGUNTA ${idx+1}: ${q.topic} ---\nEnunciado: ${q.q}\nRespuesta del alumno:\n${examAnswers[idx]||'(vacío)'}\n`;
});

try{
const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${k}`},body:JSON.stringify({model:m,max_tokens:1500,temperature:.3,messages:[{role:'system',content:`Eres un profesor de JavaScript para n8n evaluando un examen final. 

INSTRUCCIONES:
- Evalúa CADA pregunta: ✅ correcto, ⚠️ parcial, ❌ incorrecto
- Para cada una explica brevemente por qué (1-2 líneas)
- Si hay error, di cuál es sin dar la solución completa
- Al final da una NOTA de 0 a 10
- Da una evaluación general del nivel (3-4 líneas): fortalezas, debilidades, qué debería repasar
- SIEMPRE en español
- Sé justo pero exigente — es un examen final
- La solución NO tiene que seguir un patrón exacto, solo funcionar correctamente
- Formato claro con separadores entre preguntas`},{role:'user',content:`EXAMEN FINAL DE JAVASCRIPT PARA N8N\n${examData}\n\nCorrige y da nota.`}]})});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${r.status}`);}
const d=await r.json();
const t=d.choices[0].message.content.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre>$2</pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
res.innerHTML=`<div class="feedback ai-response" style="display:block;margin-top:1rem"><div class="ai-badge">🤖 RESULTADO — ${m}</div>${t}</div>`;
btn.style.display='none';
document.getElementById('retryExam').style.display='block';
// Check if passed (7+)
const nota=d.choices[0].message.content.match(/(\d+(?:[.,]\d+)?)\s*\/\s*10/);
if(nota&&parseFloat(nota[1].replace(',','.'))>=7){markD(i);}
}catch(e){res.innerHTML=`<div class="feedback incorrect" style="display:block;margin-top:1rem">❌ ${e.message}</div>`;btn.disabled=false;btn.textContent='📝 Enviar examen';}}

function next(){cur++;if(cur>=L.length){rL(null);rNav();saveS();return;}go(cur);}
function go(i){cur=i;rNav();rL(i);saveS();window.scrollTo({top:0,behavior:'smooth'});}
function updP(){const c=done.size,t=L.length;document.getElementById('progressCount').textContent=`${c}/${t}`;document.getElementById('progressFill').style.width=`${(c/t)*100}%`;}

loadS();rNav();rL(cur);updP();
</script>
</body>
</html>
